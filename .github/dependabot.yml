version: 2
updates:
  - package-ecosystem: "github-actions"
    open-pull-requests-limit: 10
    directory: "/"
    schedule:
      interval: "weekly"
      time: "08:00"
      timezone: "Europe/Oslo"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: "npm"
    open-pull-requests-limit: 10
    directory: "/"
    schedule:
      interval: "weekly"
      time: "08:00"
      timezone: "Europe/Oslo"
    allow:
      - dependency-type: "direct" # Only update top-level packages
    cooldown:
      default-days: 3
      semver-major-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - dependencies
      - npm
    groups:
      # Group all development dependencies together
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Group ESLint and linting packages
      linting:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "@types/vscode"
        versions:
          - ">=1.85.0"
