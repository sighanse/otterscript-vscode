name: Actionlint

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/**'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: actionlint
        uses: raven-actions/actionlint@v2
