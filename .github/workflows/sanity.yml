name: Sanity

on:
  pull_request:
  workflow_dispatch:
    inputs:
      delete_cache:
        description: "Delete NPM Cache"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sanity:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Delete npm cache
        if: ${{ inputs.delete_cache }}
        run: npm cache clean --force

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # ============================================================
      # VALIDATION STEPS
      # ============================================================

      - name: Validate JavaScript syntax
        id: syntax
        continue-on-error: true
        run: |
          echo "Syntax checking..."
          node -c src/extension.js
          node -c src/helpers.js
          node -c src/language-data.js
          echo "✅ JavaScript Syntax validation passed"

      - name: Validate module exports
        id: exports
        continue-on-error: true
        run: |
          echo "Validating exports..."
          node -e "require('./src/language-data.js')"
          echo "✅ Module Export validation passed"

      - name: ESLint
        id: eslint
        run: npm run lint:ci
        continue-on-error: true

      - name: npm security audit
        id: audit
        continue-on-error: true
        run: |
          echo "Running security audit..."
          npm audit --audit-level=moderate

      - name: Validate JSON files
        id: json
        continue-on-error: true
        run: |
          for file in package.json language-configuration.json syntaxes/otterscript.tmLanguage.json; do
            echo "Validating $file..."
            node -e "JSON.parse(require('fs').readFileSync('$file', 'utf8'))"
          done
           echo "✅ JSON validation passed"

      - name: Validate JSONC files
        id: jsonc
        continue-on-error: true
        run: |
          node -e "
            const fs = require('fs');
            const { parse } = require('jsonc-parser');
            const text = fs.readFileSync('snippets/otterscript.json', 'utf8');
            const errors = [];
            parse(text, errors);
            if (errors.length) {
              console.error('JSONC parsing errors:', errors);
              process.exit(1);
            }
            console.log('snippets/otterscript.json is valid');
          "
          echo "✅ JSONC validation passed"

      - name: Verify LF line endings
        id: lineEndings
        continue-on-error: true
        run: |
          echo "## Line Ending Verification"
          echo ""

          # Check src/ files
          CRLF_FILES=$(grep -rlI $'\r' src/ 2>/dev/null || true)

          if [ -n "$CRLF_FILES" ]; then
            echo "❌ Files with CRLF line endings:"
            echo '```'
            echo "$CRLF_FILES"
            echo '```'
            exit 1
          fi

          echo "✅ All source files have LF line endings"

      - name: Summary
        if: always()
        run: |
          echo "## Sanity Check Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Syntax
          if [ "${{ steps.syntax.outcome }}" == "success" ]; then
            echo "✅ Syntax validation: passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Syntax validation: failed" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Exports
          if [ "${{ steps.exports.outcome }}" == "success" ]; then
            echo "✅ Module exports: passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Module exports: failed" >> "$GITHUB_STEP_SUMMARY"
          fi

          # ESLint
          if [ "${{ steps.eslint.outcome }}" == "success" ]; then
            echo "✅ ESLint: passed" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.eslint.outcome }}" == "failure" ]; then
            echo "⚠️ ESLint: issues found" >> "$GITHUB_STEP_SUMMARY"
          fi

          # JSON
          if [ "${{ steps.json.outcome }}" == "success" ]; then
            echo "✅ JSON validation: passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ JSON validation: failed" >> "$GITHUB_STEP_SUMMARY"
          fi

          # JSONC
          if [ "${{ steps.jsonc.outcome }}" == "success" ]; then
            echo "✅ JSONC validation: passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ JSONC validation: failed" >> "$GITHUB_STEP_SUMMARY"
          fi

          # npm audit
          if [ "${{ steps.audit.outcome }}" == "success" ]; then
            echo "✅ npm audit: passed (no vulnerabilities)" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.audit.outcome }}" == "failure" ]; then
            echo "⚠️ npm audit: vulnerability(ies) found" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⏭️ npm audit: cancelled/skipped" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Line Endings
          if [ "${{ steps.lineEndings.outcome }}" == "success" ]; then
            echo "✅ Line endings: LF" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Line endings: CRLF detected" >> "$GITHUB_STEP_SUMMARY"
          fi
